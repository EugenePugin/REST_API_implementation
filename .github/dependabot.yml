version: 2
updates:
  # Auto-update configuration for Go (go.mod)
  - package-ecosystem: "gomod"
    directory: "/"                  # Repository root where go.mod is located
    schedule:
      interval: "weekly"            # Check for updates once a week

  # Auto-update configuration for TypeSpec (npm / package.json)
  - package-ecosystem: "npm"
    directory: "/api/typespec"      # Path to the directory where package.json is located
    schedule:
      interval: "weekly"            # Check for updates once a week